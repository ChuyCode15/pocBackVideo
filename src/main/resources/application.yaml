spring:
  application:
    name: scaleVision

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    url: jdbc:h2:file:./data/scalevision;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB

  mvc:
    async:
      request-timeout: 60000

app:
  storage:
    path: ${DB_STORAGE_VIDEO}
    url: ${STORAGE_NGIX}


server:
  error:
    include-stacktrace: never
    include-message: always # Para que al menos sepan qué error fue
    include-binding-errors: always